{% extends 'base.html' %}
{% block title %}Вход через ЭЦП{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 560px;">
        <div class="card-body">
            <h3 class="text-center mb-4">🔑 Вход через ЭЦП</h3>
            
            <button onclick="startEDSLogin()" class="btn btn-success btn-lg w-100 py-3">
                Войти с помощью ЭЦП
            </button>

            <div id="eds-status" class="mt-3 text-center"></div>

            <a href="{{ url_for('login') }}" class="btn btn-link w-100 mt-3">
                ← Обычный вход (email + пароль)
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.2/axios.min.js"></script>
<script>
const NCALAYER_URL = "ws://127.0.0.1:9090";

function showStatus(text, type = "info") {
    document.getElementById("eds-status").innerHTML = `<div class="alert alert-${type}">${text}</div>`;
}

async function startEDSLogin() {
    showStatus("Подключение к NCALayer...");

    const ws = new WebSocket(NCALAYER_URL);
    
    ws.onopen = () => {
        // Шаг 1: Запрашиваем список ключей (только AUTH)
        ws.send(JSON.stringify({
            "module": "kz.gov.pki.ncalayer",
            "method": "getKeys",
            "args": ["PKCS12", "AUTH"]
        }));
    };

    ws.onmessage = (e) => {
        const res = JSON.parse(e.data);
        
        // Проверка на ошибку со стороны NCALayer
        if (res.status !== "0") {
            showStatus("Ошибка: " + (res.message || "Действие отменено"), "danger");
            ws.close();
            return;
        }

        if (res.method === "getKeys") {
            // Шаг 2: Получаем alias выбранного ключа
            const keys = res.result.split(',');
            const keyAlias = keys.length ? keys[0] : null;            if (!keyAlias) {
                showStatus("Ключ не выбран", "warning");
                return;
            }

            // Шаг 3: Получаем информацию о сертификате (ИИН)
            ws.send(JSON.stringify({
                "module": "kz.gov.pki.ncalayer",
                "method": "getCertificateInfo",
                "args": [keyAlias]
            }));
        } 
        else if (res.method === "getCertificateInfo") {
            // Шаг 4: Парсим данные сертификата
            // Данные приходят строкой, где значения разделены новой строкой \n
            const info = res.result;
            const iinMatch = info.match(/IIN=(\d+)/) || info.match(/BIN=(\d+)/);
            
            if (iinMatch && iinMatch[1]) {
                const iin = iinMatch[1];
                sendToServer(iin);
            } else {
                showStatus("Не удалось извлечь ИИН из сертификата", "danger");
            }
            ws.close();
        }
    };

    ws.onerror = () => {
        showStatus("❌ NCALayer не запущен или заблокирован. Запустите программу и обновите страницу.", "danger");
    };
}

function sendToServer(iin) {
    showStatus("Авторизация на сервере...");
    
    axios.post('/login-eds', { eds_iin: iin })
    .then(r => {
        if (r.data.status === 'ok') {
            showStatus("Успешно! Перенаправление...", "success");
            window.location.href = r.data.redirect;
        } else {
            showStatus(r.data.message || "Пользователь с таким ИИН не найден", "danger");
        }
    })

}
</script>
{% endblock %}
