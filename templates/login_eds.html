{% extends 'base.html' %}
{% block title %}Вход через ЭЦП{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 560px;">
        <div class="card-body">
            <h3 class="text-center mb-4">🔑 Вход через ЭЦП</h3>
            
            <button id="eds-button" onclick="startEDSLogin()" class="btn btn-success btn-lg w-100 py-3 mb-3">
                Войти с помощью ЭЦП
            </button>

            <div id="eds-status" class="mt-2 text-center"></div>

            <a href="{{ url_for('login') }}" class="btn btn-link w-100 mt-3">
                ← Обычный вход (email + пароль)
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.2/axios.min.js"></script>
<script>
// === ПРЯМОЕ ПОДКЛЮЧЕНИЕ К NCALAYER (самый надёжный способ) ===
const NCALAYER_WS = "ws://127.0.0.1:9090";

function showStatus(text, type = "info") {
    const div = document.getElementById("eds-status");
    div.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
}

async function startEDSLogin() {
    const btn = document.getElementById("eds-button");
    btn.disabled = true;
    showStatus("Подключение к NCALayer...", "info");

    const ws = new WebSocket(NCALAYER_WS);

    ws.onopen = () => {
        // Запрашиваем список ключей
        ws.send(JSON.stringify({
            "module": "kz.gov.pki.ncalayer",
            "method": "getKeys",
            "args": ["PKCS12", "AUTH"]
        }));
    };

    ws.onmessage = (event) => {
        const response = JSON.parse(event.data);

        if (response.method === "getKeys") {
            if (!response.response || response.response.length === 0) {
                showStatus("Ключи не найдены. Вставьте ЭЦП.", "warning");
                btn.disabled = false;
                ws.close();
                return;
            }

            // Берём первый ключ
            const key = response.response[0];

            // Запрашиваем информацию о сертификате
            ws.send(JSON.stringify({
                "module": "kz.gov.pki.ncalayer",
                "method": "getCertificateInfo",
                "args": [key]
            }));
        }
        else if (response.method === "getCertificateInfo") {
            const cert = response.response;
            let iin = null;

            // Ищем ИИН
            if (cert.iin) iin = cert.iin;
            else if (cert.subjectDN) {
                const match = cert.subjectDN.match(/IIN=(\d{12})/);
                if (match) iin = match[1];
            }

            if (iin) {
                sendToServer(iin);
            } else {
                showStatus("Не удалось получить ИИН из сертификата", "danger");
                btn.disabled = false;
            }
            ws.close();
        }
    };

    ws.onerror = () => {
        showStatus("❌ NCALayer не запущен.<br>Запустите программу NCALayer от имени администратора.", "danger");
        btn.disabled = false;
    };

    ws.onclose = () => {};
}

function sendToServer(iin) {
    showStatus(`Авторизация... ИИН: ${iin}`, "info");

    axios.post('/login-eds', { eds_iin: iin }, {
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => {
        if (response.data.status === 'ok') {
            window.location.href = response.data.redirect;
        } else {
            showStatus(response.data.message, "danger");
            document.getElementById("eds-button").disabled = false;
        }
    })
    .catch(() => {
        showStatus("Ошибка связи с сервером", "danger");
        document.getElementById("eds-button").disabled = false;
    });
}
</script>
{% endblock %}
